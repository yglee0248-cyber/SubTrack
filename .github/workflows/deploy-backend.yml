name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "deploy/backend/**"
      - ".github/workflows/deploy-backend.yml"

permissions:
  contents: read

env:
  BACKEND_SERVICE_NAME: ${{ vars.BACKEND_SERVICE_NAME || 'subtrack-backend' }}
  EC2_APP_DIR: ${{ vars.EC2_APP_DIR || '/opt/subtrack' }}
  BACKEND_JAR_NAME: ${{ vars.BACKEND_JAR_NAME || 'subtrack-backend.jar' }}
  EC2_SERVICE_USER: ${{ vars.EC2_SERVICE_USER }}
  CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
  EXCHANGE_RATE_BASE_URL: ${{ vars.EXCHANGE_RATE_BASE_URL || 'https://api.frankfurter.dev' }}
  SERVER_PORT: "8080"
  JWT_ACCESS_TOKEN_EXPIRATION_MS: "3600000"

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required variables and secrets
        env:
          EC2_HOST_VALUE: ${{ secrets.EC2_HOST }}
          EC2_USER_VALUE: ${{ secrets.EC2_USER }}
          EC2_SSH_PRIVATE_KEY_VALUE: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          DB_URL_VALUE: ${{ secrets.DB_URL }}
          DB_USERNAME_VALUE: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD_VALUE: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET_VALUE: ${{ secrets.JWT_SECRET }}
        run: |
          missing=0

          if [[ -z "${BACKEND_SERVICE_NAME:-}" ]]; then
            echo "::error title=Missing backend config::BACKEND_SERVICE_NAME is required."
            missing=1
          fi

          if [[ -z "${EC2_APP_DIR:-}" ]]; then
            echo "::error title=Missing backend config::EC2_APP_DIR is required."
            missing=1
          fi

          if [[ -z "${BACKEND_JAR_NAME:-}" ]]; then
            echo "::error title=Missing backend config::BACKEND_JAR_NAME is required."
            missing=1
          fi

          if [[ -z "${EC2_SERVICE_USER:-}" ]]; then
            echo "::error title=Missing repository variable::EC2_SERVICE_USER is required."
            missing=1
          fi

          if [[ -z "${CORS_ALLOWED_ORIGINS:-}" ]]; then
            echo "::error title=Missing repository variable::CORS_ALLOWED_ORIGINS is required."
            missing=1
          fi

          if [[ -z "${EC2_HOST_VALUE:-}" ]]; then
            echo "::error title=Missing repository secret::EC2_HOST is required."
            missing=1
          fi

          if [[ -z "${EC2_USER_VALUE:-}" ]]; then
            echo "::error title=Missing repository secret::EC2_USER is required."
            missing=1
          fi

          if [[ -z "${EC2_SSH_PRIVATE_KEY_VALUE:-}" ]]; then
            echo "::error title=Missing repository secret::EC2_SSH_PRIVATE_KEY is required."
            missing=1
          fi

          if [[ -z "${DB_URL_VALUE:-}" ]]; then
            echo "::error title=Missing repository secret::DB_URL is required."
            missing=1
          fi

          if [[ -z "${DB_USERNAME_VALUE:-}" ]]; then
            echo "::error title=Missing repository secret::DB_USERNAME is required."
            missing=1
          fi

          if [[ -z "${DB_PASSWORD_VALUE:-}" ]]; then
            echo "::error title=Missing repository secret::DB_PASSWORD is required."
            missing=1
          fi

          if [[ -z "${JWT_SECRET_VALUE:-}" ]]; then
            echo "::error title=Missing repository secret::JWT_SECRET is required."
            missing=1
          fi

          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Build backend
        working-directory: backend
        run: |
          chmod +x ./mvnw
          ./mvnw clean package

      - name: Prepare deployment artifacts
        run: |
          mkdir -p deploy-artifacts

          jar_path="$(find backend/target -maxdepth 1 -type f -name "*.jar" | head -n 1)"
          if [[ -z "${jar_path}" ]]; then
            echo "::error title=JAR not found::No JAR file found under backend/target."
            exit 1
          fi

          cp "${jar_path}" "deploy-artifacts/${BACKEND_JAR_NAME}"

          sed \
            -e "s|<ec2-app-user>|${EC2_SERVICE_USER}|g" \
            -e "s|/opt/subtrack|${EC2_APP_DIR}|g" \
            -e "s|subtrack-backend.jar|${BACKEND_JAR_NAME}|g" \
            deploy/backend/subtrack.service > deploy-artifacts/subtrack-backend.service

          if grep -q "<ec2-app-user>" deploy-artifacts/subtrack-backend.service; then
            echo "::error title=Invalid systemd service::The <ec2-app-user> placeholder was not replaced."
            exit 1
          fi

      - name: Create production app.env
        env:
          DB_URL_VALUE: ${{ secrets.DB_URL }}
          DB_USERNAME_VALUE: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD_VALUE: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET_VALUE: ${{ secrets.JWT_SECRET }}
        run: |
          install -m 600 /dev/null deploy-artifacts/app.env
          {
            printf '%s\n' "SPRING_PROFILES_ACTIVE=prod"
            printf 'SERVER_PORT=%s\n' "${SERVER_PORT}"
            printf 'DB_URL=%s\n' "${DB_URL_VALUE}"
            printf 'DB_USERNAME=%s\n' "${DB_USERNAME_VALUE}"
            printf 'DB_PASSWORD=%s\n' "${DB_PASSWORD_VALUE}"
            printf 'JWT_SECRET=%s\n' "${JWT_SECRET_VALUE}"
            printf 'JWT_ACCESS_TOKEN_EXPIRATION_MS=%s\n' "${JWT_ACCESS_TOKEN_EXPIRATION_MS}"
            printf 'CORS_ALLOWED_ORIGINS=%s\n' "${CORS_ALLOWED_ORIGINS}"
            printf 'EXCHANGE_RATE_BASE_URL=%s\n' "${EXCHANGE_RATE_BASE_URL}"
          } > deploy-artifacts/app.env
          chmod 600 deploy-artifacts/app.env

      - name: Configure SSH
        env:
          EC2_HOST_VALUE: ${{ secrets.EC2_HOST }}
          EC2_SSH_PRIVATE_KEY_VALUE: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/subtrack_ec2_key
          printf '%s' "${EC2_SSH_PRIVATE_KEY_VALUE}" > ~/.ssh/subtrack_ec2_key
          ssh-keyscan -H "${EC2_HOST_VALUE}" >> ~/.ssh/known_hosts

      - name: Prepare EC2 app directory
        env:
          EC2_HOST_VALUE: ${{ secrets.EC2_HOST }}
          EC2_USER_VALUE: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/subtrack_ec2_key "${EC2_USER_VALUE}@${EC2_HOST_VALUE}" "bash -s" <<EOF
          set -euo pipefail
          sudo mkdir -p "${EC2_APP_DIR}"
          sudo chown "${EC2_SERVICE_USER}" "${EC2_APP_DIR}"
          EOF

      - name: Upload backend artifacts to EC2
        env:
          EC2_HOST_VALUE: ${{ secrets.EC2_HOST }}
          EC2_USER_VALUE: ${{ secrets.EC2_USER }}
        run: |
          scp -i ~/.ssh/subtrack_ec2_key "deploy-artifacts/${BACKEND_JAR_NAME}" \
            "${EC2_USER_VALUE}@${EC2_HOST_VALUE}:/tmp/${BACKEND_JAR_NAME}"
          scp -i ~/.ssh/subtrack_ec2_key deploy-artifacts/subtrack-backend.service \
            "${EC2_USER_VALUE}@${EC2_HOST_VALUE}:/tmp/subtrack-backend.service"
          scp -i ~/.ssh/subtrack_ec2_key deploy-artifacts/app.env \
            "${EC2_USER_VALUE}@${EC2_HOST_VALUE}:/tmp/app.env"

      - name: Install systemd service and restart backend
        env:
          EC2_HOST_VALUE: ${{ secrets.EC2_HOST }}
          EC2_USER_VALUE: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/subtrack_ec2_key "${EC2_USER_VALUE}@${EC2_HOST_VALUE}" "bash -s" <<EOF
          set -euo pipefail
          trap 'sudo rm -f /tmp/app.env "/tmp/${BACKEND_JAR_NAME}" /tmp/subtrack-backend.service' EXIT
          sudo mkdir -p "${EC2_APP_DIR}"
          sudo cp /tmp/app.env "${EC2_APP_DIR}/app.env"
          sudo chown "${EC2_SERVICE_USER}" "${EC2_APP_DIR}/app.env"
          sudo chmod 600 "${EC2_APP_DIR}/app.env"
          sudo cp "/tmp/${BACKEND_JAR_NAME}" "${EC2_APP_DIR}/${BACKEND_JAR_NAME}"
          sudo chown "${EC2_SERVICE_USER}" "${EC2_APP_DIR}/${BACKEND_JAR_NAME}"
          sudo chmod 644 "${EC2_APP_DIR}/${BACKEND_JAR_NAME}"
          sudo cp /tmp/subtrack-backend.service "/etc/systemd/system/${BACKEND_SERVICE_NAME}.service"
          sudo systemctl daemon-reload
          sudo systemctl enable "${BACKEND_SERVICE_NAME}"
          sudo systemctl restart "${BACKEND_SERVICE_NAME}"
          EOF

      - name: Health check
        env:
          EC2_HOST_VALUE: ${{ secrets.EC2_HOST }}
          EC2_USER_VALUE: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/subtrack_ec2_key "${EC2_USER_VALUE}@${EC2_HOST_VALUE}" "bash -s" <<EOF
          set -euo pipefail
          for attempt in {1..12}; do
            if curl -fsS http://localhost:8080/api/health; then
              exit 0
            fi
            sleep 5
          done

          echo "Backend health check failed."
          sudo systemctl status "${BACKEND_SERVICE_NAME}" --no-pager || true
          sudo journalctl -u "${BACKEND_SERVICE_NAME}" -n 80 --no-pager || true
          exit 1
          EOF

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f deploy-artifacts/app.env
          rm -f ~/.ssh/subtrack_ec2_key
