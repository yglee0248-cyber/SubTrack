server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: subtrack-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/subtrack?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.subtrack.domain
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:local-development-secret-key-change-later}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600000}

onesignal:
  app-id: ${ONESIGNAL_APP_ID:}
  rest-api-key: ${ONESIGNAL_REST_API_KEY:}

scheduler:
  payment-reminder:
    enabled: ${PAYMENT_REMINDER_ENABLED:true}
    cron: "${PAYMENT_REMINDER_CRON:0 0 9 * * *}"

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    root: info
    com.subtrack: debug
