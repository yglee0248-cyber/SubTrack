services:
  mysql:
    image: mysql:8.0
    container_name: subtrack-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: subtrack
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    volumes:
      - subtrack_mysql_data:/var/lib/mysql

volumes:
  subtrack_mysql_data:
